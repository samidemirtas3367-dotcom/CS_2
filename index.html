<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CS2 Web - Tam Sürüm (Kontrol Fix)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* UI Elemanları */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: lime; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        .ch-line { position: absolute; background: lime; }
        #ch-top { width: 2px; height: 12px; top: -16px; left: -1px; transition: top 0.1s; }
        #ch-bottom { width: 2px; height: 12px; top: 6px; left: -1px; transition: top 0.1s; }
        #ch-left { width: 12px; height: 2px; left: -16px; top: -1px; transition: left 0.1s; }
        #ch-right { width: 12px; height: 2px; left: 6px; top: -1px; transition: left 0.1s; }

        #hud { position: absolute; bottom: 20px; left: 20px; color: #fff; font-size: 30px; text-shadow: 2px 2px 0 #000; z-index: 5; }
        #hp { color: lime; font-weight: bold; }
        #ammo-ui { position: absolute; bottom: 20px; right: 20px; color: #fff; font-size: 36px; text-shadow: 2px 2px 0 #000; z-index: 5; }
        #weapon-name { font-size: 20px; color: #aaa; display: block; text-align: right; }
        
        #killfeed { position: absolute; top: 20px; right: 20px; color: white; font-size: 18px; text-align: right; z-index: 5; font-weight: bold; text-shadow: 1px 1px 0 #000; }
        
        /* Radar (Minimap) */
        #radar { position: absolute; top: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.6); border: 2px solid #555; border-radius: 50%; z-index: 5; overflow: hidden; }
        #radar-player { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: lime; transform: translate(-50%, -50%); border-radius: 50%; }
        .radar-bot { position: absolute; width: 4px; height: 4px; background: red; border-radius: 50%; transform: translate(-50%, -50%); transition: all 0.1s; }

        /* AWP Scope */
        #scope-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(transparent 30%, black 70%); z-index: 6; pointer-events: none; }
        #scope-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: black; }
        #scope-line-v { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: black; }

        #blood { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.5); opacity: 0; z-index: 4; pointer-events: none; transition: opacity 0.1s; }
        #death-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100,0,0,0.9); color: white; text-align: center; font-size: 60px; line-height: 100vh; z-index: 10; font-weight: bold; font-family: Impact, sans-serif; }
        
        #instructions { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .key { background: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; color: lime; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1 style="color:orange;">CS2 WEB - KANLI ARENA</h1>
        <p>Oyuna başlamak için ekrana tıkla.</p>
        <p><span class="key">WASD</span> Yürü | <span class="key">Space</span> Zıpla | <span class="key">Sol Tık</span> Ateş | <span class="key">Sağ Tık</span> Dürbün</p>
        <p><span class="key">1</span> AK-47 | <span class="key">2</span> AWP | <span class="key">R</span> Şarjör Değiştir</p>
    </div>

    <div id="crosshair">
        <div class="ch-line" id="ch-top"></div><div class="ch-line" id="ch-bottom"></div>
        <div class="ch-line" id="ch-left"></div><div class="ch-line" id="ch-right"></div>
    </div>
    
    <div id="scope-overlay">
        <div id="scope-line-h"></div><div id="scope-line-v"></div>
    </div>

    <div id="radar"><div id="radar-player"></div></div>
    
    <div id="hud">✚ <span id="hp">100</span> | 🛡️ 100</div>
    <div id="ammo-ui"><span id="weapon-name">AK-47</span><span id="ammo">30</span> / <span id="reserve">90</span></div>
    
    <div id="killfeed"></div>
    <div id="blood"></div>
    <div id="death-screen">YOK EDİLDİN</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        // --- SES MOTORU ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'ak47') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'awp') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'hit') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // --- SAHNE VE KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 150);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffdfb0, 1.2);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);

        // --- ÇARPIŞMA MOTORU ---
        const walls = [];
        function createWall(x, y, z, w, h, d, color) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color }));
            mesh.position.set(x, y, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            walls.push(new THREE.Box3().setFromObject(mesh));
        }

        function checkCollision(pos) {
            const pBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(1.2, 1.8, 1.2));
            for(let w of walls) if(pBox.intersectsBox(w)) return true;
            return false;
        }

        // --- HARİTA ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xe3cda4, roughness: 1 }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

        createWall(0, 10, -100, 200, 20, 2, 0xc2a67a);
        createWall(0, 10, 100, 200, 20, 2, 0xc2a67a);
        createWall(-100, 10, 0, 2, 20, 200, 0xc2a67a);
        createWall(100, 10, 0, 2, 20, 200, 0xc2a67a);

        for(let i=0; i<30; i++) {
            let w = 2 + Math.random() * 8, h = 3 + Math.random() * 5, d = 2 + Math.random() * 8;
            createWall((Math.random()-0.5)*150, h/2, (Math.random()-0.5)*150, w, h, d, 0x8b5a2b);
        }

        // --- SİLAHLAR ---
        let currentWeapon = 'ak47';
        let isZoomed = false;
        const weapons = {
            ak47: { name: "AK-47", ammo: 30, maxAmmo: 30, reserve: 90, damage: 35, fireRate: 100, auto: true, recoil: 0.05, color: 0x8b4513 },
            awp: { name: "AWP", ammo: 10, maxAmmo: 10, reserve: 30, damage: 150, fireRate: 1200, auto: false, recoil: 0.15, color: 0x004400 }
        };

        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.6), new THREE.MeshStandardMaterial({color: weapons.ak47.color}));
        const gunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshStandardMaterial({color: 0x111}));
        gunBarrel.rotation.x = Math.PI/2; gunBarrel.position.set(0, 0, -0.4);
        gunGroup.add(gunBody); gunGroup.add(gunBarrel);
        
        const gunPos = new THREE.Vector3(0.3, -0.25, -0.5);
        gunGroup.position.copy(gunPos);
        camera.add(gunGroup); scene.add(camera);

        const flash = new THREE.PointLight(0xffaa00, 0, 5);
        flash.position.set(0, 0, -0.8); gunGroup.add(flash);

        function switchWeapon(type) {
            if(isZoomed) toggleZoom();
            currentWeapon = type;
            gunBody.material.color.setHex(weapons[type].color);
            document.getElementById('weapon-name').innerText = weapons[type].name;
            updateAmmoUI();
        }

        function toggleZoom() {
            if(currentWeapon !== 'awp') return;
            isZoomed = !isZoomed;
            camera.fov = isZoomed ? 20 : 75;
            camera.updateProjectionMatrix();
            gunGroup.visible = !isZoomed;
            document.getElementById('scope-overlay').style.display = isZoomed ? 'block' : 'none';
            document.getElementById('crosshair').style.display = isZoomed ? 'none' : 'block';
        }

        function updateAmmoUI() {
            document.getElementById('ammo').innerText = weapons[currentWeapon].ammo;
            document.getElementById('reserve').innerText = weapons[currentWeapon].reserve;
        }

        // --- BOTLAR ---
        const bots = [];
        const radarEl = document.getElementById('radar');
        
        function spawnBot() {
            const bot = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2, 16), new THREE.MeshStandardMaterial({color: 0xff0000}));
            body.position.y = 1; body.castShadow = true;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({color: 0xffcc99}));
            head.position.y = 2.4; head.castShadow = true;
            bot.add(body); bot.add(head);
            
            bot.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
            bot.userData = { hp: 100, speed: 3 + Math.random()*2, dead: false, nextFire: 0 };
            scene.add(bot); bots.push(bot);

            const dot = document.createElement('div');
            dot.className = 'radar-bot';
            radarEl.appendChild(dot);
            bot.userData.radarDot = dot;
        }
        for(let i=0; i<8; i++) spawnBot();

        // --- KONTROLLER ---
        let playerHP = 100, isDead = false;
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => { if(!isDead) controls.lock(); });
        controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');

        const move = { f: false, b: false, l: false, r: false };
        const vel = new THREE.Vector3(), dir = new THREE.Vector3();
        let canJump = true, isShooting = false, lastShotTime = 0;
        let shakeOffset = 0; // KAMERA FİX DEĞİŞKENİ

        document.addEventListener('keydown', e => {
            if(e.code === 'KeyW') move.f = true; if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true; if(e.code === 'KeyD') move.r = true;
            if(e.code === 'Space' && canJump) { vel.y = 12; canJump = false; }
            if(e.code === 'Digit1') switchWeapon('ak47');
            if(e.code === 'Digit2') switchWeapon('awp');
            if(e.code === 'KeyR') reload();
        });
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') move.f = false; if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false; if(e.code === 'KeyD') move.r = false;
        });

        function reload() {
            let wp = weapons[currentWeapon];
            if(wp.ammo === wp.maxAmmo || wp.reserve <= 0) return;
            document.getElementById('ammo').innerText = "R..";
            gunGroup.rotation.x = -Math.PI/4;
            setTimeout(() => {
                let needed = wp.maxAmmo - wp.ammo;
                if(wp.reserve >= needed) { wp.ammo += needed; wp.reserve -= needed; } 
                else { wp.ammo += wp.reserve; wp.reserve = 0; }
                gunGroup.rotation.x = 0; updateAmmoUI();
            }, 1500);
        }

        // --- ATEŞ SİSTEMİ ---
        const raycaster = new THREE.Raycaster();
        
        function fire() {
            let wp = weapons[currentWeapon];
            let now = performance.now();
            if(!controls.isLocked || isDead || wp.ammo <= 0 || now - lastShotTime < wp.fireRate) return;
            
            wp.ammo--; updateAmmoUI(); lastShotTime = now;
            playSound(currentWeapon);
            
            flash.intensity = 5; setTimeout(() => flash.intensity = 0, 50);
            
            // KAMERA FİXİ: Rotasyonu bozmak yerine silahı teptirip ekrana shake veriyoruz
            gunGroup.position.z += 0.1; 
            shakeOffset = wp.recoil; 
            
            if(!isZoomed) {
                document.getElementById('ch-top').style.top = '-20px'; document.getElementById('ch-bottom').style.top = '10px';
                document.getElementById('ch-left').style.left = '-20px'; document.getElementById('ch-right').style.left = '10px';
                setTimeout(() => {
                    document.getElementById('ch-top').style.top = '-16px'; document.getElementById('ch-bottom').style.top = '6px';
                    document.getElementById('ch-left').style.left = '-16px'; document.getElementById('ch-right').style.left = '6px';
                }, 100);
            }

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const targets = bots.flatMap(b => b.children).filter(c => !c.parent.userData.dead);
            const hits = raycaster.intersectObjects(targets);

            if(hits.length > 0) {
                playSound('hit');
                let hitMesh = hits[0].object; let pBot = hitMesh.parent;
                let isHS = hitMesh.geometry.type === 'SphereGeometry';
                pBot.userData.hp -= isHS ? wp.damage * 4 : wp.damage;
                
                hitMesh.material.color.setHex(0x880000);
                setTimeout(() => { if(!pBot.userData.dead) hitMesh.material.color.setHex(isHS ? 0xffcc99 : 0xff0000); }, 100);

                if(pBot.userData.hp <= 0 && !pBot.userData.dead) {
                    pBot.userData.dead = true;
                    pBot.userData.radarDot.style.display = 'none';
                    pBot.rotation.x = -Math.PI/2; pBot.position.y = 0.5;
                    
                    const kf = document.getElementById('killfeed');
                    kf.innerHTML += `<div style="color:${isHS ? 'red' : 'white'}">Sen 🔫${isHS ? '(HS)' : ''} Bot</div>`;
                    setTimeout(() => kf.innerHTML = '', 4000);

                    setTimeout(() => { scene.remove(pBot); bots.splice(bots.indexOf(pBot), 1); spawnBot(); }, 3000);
                }
            }
        }

        let autoFire;
        window.addEventListener('mousedown', e => { 
            if(e.button === 0) { fire(); if(weapons[currentWeapon].auto) autoFire = setInterval(fire, weapons[currentWeapon].fireRate); }
            if(e.button === 2) toggleZoom();
        });
        window.addEventListener('mouseup', e => { if(e.button === 0) clearInterval(autoFire); });

        function takeDamage(dmg) {
            if(isDead) return;
            playerHP -= dmg; document.getElementById('hp').innerText = playerHP;
            document.getElementById('hp').style.color = playerHP <= 30 ? 'red' : 'lime';
            document.getElementById('blood').style.opacity = 1;
            setTimeout(() => document.getElementById('blood').style.opacity = 0, 150);

            if(playerHP <= 0) {
                isDead = true; controls.unlock();
                document.getElementById('death-screen').style.display = 'block';
                setTimeout(() => location.reload(), 3000);
            }
        }

        // --- ANA DÖNGÜ ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            let time = performance.now(); let delta = (time - prevTime) / 1000;

            if (controls.isLocked && !isDead) {
                vel.x -= vel.x * 10 * delta; vel.z -= vel.z * 10 * delta; vel.y -= 9.8 * 4 * delta;
                dir.z = Number(move.f) - Number(move.b); dir.x = Number(move.r) - Number(move.l); dir.normalize(); 
                
                if (move.f || move.b) vel.z -= dir.z * 60 * delta;
                if (move.l || move.r) vel.x -= dir.x * 60 * delta;

                let p = controls.getObject().position;
                
                // Kaygan Çarpışma Sistemi
                let nx = p.clone(); nx.x -= vel.x * delta;
                if(!checkCollision(nx)) p.x = nx.x; else vel.x = 0;
                
                let nz = p.clone(); nz.z -= vel.z * delta;
                if(!checkCollision(nz)) p.z = nz.z; else vel.z = 0;

                // Zıplama
                p.y += vel.y * delta;
                if (p.y < 1.6) { vel.y = 0; p.y = 1.6; canJump = true; }

                // KAMERA FİXİ: Sadece kameranın Y eksenini hafifçe titretiyoruz
                if (shakeOffset > 0) {
                    controls.getObject().position.y += shakeOffset;
                    shakeOffset -= delta * 0.5; // Titremeyi yavaşça azalt
                    if(controls.getObject().position.y > 1.8) controls.getObject().position.y = 1.8;
                }

                gunGroup.position.lerp(gunPos, 0.1);

                // --- BOT YAPAY ZEKASI ---
                bots.forEach(bot => {
                    if(!bot.userData.dead) {
                        bot.lookAt(p.x, bot.position.y, p.z);
                        let dist = bot.position.distanceTo(p);
                        
                        if(dist > 15 && dist < 80) {
                            let nextBotP = bot.position.clone();
                            nextBotP.add(bot.getWorldDirection(new THREE.Vector3()).multiplyScalar(bot.userData.speed * delta));
                            if(!checkCollision(nextBotP)) bot.position.copy(nextBotP);
                        } else if(dist <= 15 && time > bot.userData.nextFire) {
                            bot.userData.nextFire = time + 500 + Math.random()*1000;
                            playSound('ak47');
                            if(Math.random() > 0.6) takeDamage(15);
                        }

                        let rx = ((bot.position.x - p.x) / 100) * 75 + 75;
                        let rz = ((bot.position.z - p.z) / 100) * 75 + 75;
                        if(rx > 0 && rx < 150 && rz > 0 && rz < 150) {
                            bot.userData.radarDot.style.display = 'block';
                            bot.userData.radarDot.style.left = rx + 'px';
                            bot.userData.radarDot.style.top = rz + 'px';
                        } else {
                            bot.userData.radarDot.style.display = 'none';
                        }
                    }
                });
            }
            prevTime = time; renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
